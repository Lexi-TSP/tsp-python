name: Conformance

# Runs the tsp-spec v3.0 fixture suite through this Python port. Goes red on any
# port/spec divergence or fixture-snapshot drift. This port is auditable, not
# normative — normative authority is Lexi-TSP/tsp-spec (ADR-0008). A failure here
# is a bug in this port, never grounds to adjust the fixtures.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fixtures:
    name: v3.0 fixture conformance
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # One runtime dep (cryptography) is needed for the Ed25519 vectors; the
      # checksum-pinned fixture snapshot itself runs offline. Integrity is
      # verified before any vector executes.
      - name: Install package
        run: python -m pip install .

      - name: Run v3.0 fixture conformance
        run: python conformance/run_conformance.py
