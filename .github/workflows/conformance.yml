name: Conformance

# Runs the tsp-spec fixture suites through this Python port: the v3.0
# TrustEnvelope vectors AND the tsp.license.v1 vectors (ADR-0010), each a
# separate checksum-pinned track. Goes red on any port/spec divergence or
# fixture-snapshot drift. This port is auditable, not
# normative — normative authority is Lexi-TSP/tsp-spec (ADR-0008). A failure here
# is a bug in this port, never grounds to adjust the fixtures.

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: conformance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fixtures:
    name: fixture conformance (v3.0 + license)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # One runtime dep (cryptography) is needed for the Ed25519 vectors; the
      # checksum-pinned fixture snapshot itself runs offline. Integrity is
      # verified before any vector executes.
      - name: Install package
        run: python -m pip install .

      - name: Run fixture conformance (v3.0 + license)
        run: python conformance/run_conformance.py
