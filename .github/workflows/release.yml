name: Release (PyPI)

# Tag-triggered publish of `tsp-verify` to PyPI.
#
# Push a version tag (for example `v0.1.0`) to release. The job refuses to
# publish a build that fails unit tests or fixture conformance, and refuses
# if the tag does not match pyproject.toml's version. Publishing uses PyPI
# Trusted Publishing (OIDC), so this needs `id-token: write` and a matching
# trusted publisher configured on PyPI for Lexi-TSP/tsp-python.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish tsp-verify to PyPI
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade pip build twine

      - name: Install package
        run: python -m pip install .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Run fixture conformance (v3.0 + license)
        run: python conformance/run_conformance.py

      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          python - <<'PY'
          import os, pathlib, sys, tomllib
          tag = os.environ["GITHUB_REF_NAME"].removeprefix("v")
          version = tomllib.loads(pathlib.Path("pyproject.toml").read_text(encoding="utf-8"))["project"]["version"]
          if tag != version:
              print(f"::error::tag v{tag} does not match pyproject.toml version {version}")
              sys.exit(1)
          print(f"tag matches package version {version}")
          PY

      - name: Build distributions
        run: python -m build

      - name: Check distributions
        run: python -m twine check dist/*

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
